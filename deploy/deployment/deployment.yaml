# 5-Spot Controller Deployment
# Uses Deployment (not StatefulSet) with leader election via kube-lease
apiVersion: apps/v1
kind: Deployment
metadata:
  name: 5spot-controller
  namespace: 5spot-system
  labels:
    app: 5spot-controller
    app.kubernetes.io/name: 5spot
    app.kubernetes.io/component: controller
spec:
  # Number of controller replicas
  # For high availability, set to 2 or 3
  # Leader election ensures only one instance is active at a time
  # Non-leader instances stand by for automatic failover (~15s)
  replicas: 1
  selector:
    matchLabels:
      app: 5spot-controller
  template:
    metadata:
      labels:
        app: 5spot-controller
        app.kubernetes.io/name: 5spot
        app.kubernetes.io/component: controller
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: 5spot-controller
      securityContext:
        fsGroup: 65534
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          # Pin to a released version tag — NEVER use :latest in production
          # manifests (Trivy KSV-0013). Update the tag via CI/CD release
          # workflow or your GitOps tool rather than editing in place.
          image: ghcr.io/finos/5-spot:v0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: RUST_LOG
              value: "debug"
            - name: RUST_LOG_FORMAT
              value: "json"
            # POD_NAME is used by the event reporter and as the leader
            # election holder identity. Must match what the code reads via
            # std::env::var("POD_NAME") in main.rs and scheduled_machine.rs.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Leader election configuration
            - name: ENABLE_LEADER_ELECTION
              value: "true"
            - name: LEASE_NAME
              value: "5spot-leader"
            - name: LEASE_DURATION_SECONDS
              value: "15"
            - name: LEASE_RENEW_DEADLINE_SECONDS
              value: "10"
            - name: LEASE_RETRY_PERIOD_SECONDS
              value: "2"
            # Finalizer-cleanup timeout behaviour.
            #
            # When "true" (binary default): on cleanup timeout the
            # controller force-removes the finalizer so namespace
            # deletion is unblocked. May leave orphan CAPI Machine /
            # bootstrap / infra resources — operators must reconcile
            # via the runbook in
            # docs/src/operations/troubleshooting.md
            # ("Orphan resources after finalizer timeout").
            #
            # When "false" (set here): the SM stays stuck with its
            # finalizer until cleanup succeeds. Namespace deletion will
            # stall on a misconfigured PodDisruptionBudget — only safe
            # when an external sweep is in place to garbage-collect
            # stalled SMs.
            #
            # The fivespot_finalizer_cleanup_timeouts_total metric and
            # the FinalizerCleanupTimedOut Warning event fire in BOTH
            # modes; the only difference is whether the finalizer is
            # removed on timeout.
            - name: FORCE_FINALIZER_ON_TIMEOUT
              value: "false"
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            seccompProfile:
              type: RuntimeDefault
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - 5spot-controller
                topologyKey: kubernetes.io/hostname
